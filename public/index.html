<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KACC E-Learning | Masuk</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
</head>
<body class="login-body">
<div class="login-bg"></div>
<div class="login-card">
  <img src="/assets/logo_kacc.webp" alt="KACC Logo" class="login-logo">
  <h1 class="login-title">E-Learning KACC</h1>
  <p class="login-subtitle">Pastoral Counselor Training Materials</p>
  <form id="loginForm" class="login-form">
    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" class="input-field" placeholder="Masukkan email" required>
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" class="input-field" placeholder="Masukkan password" required>
    </div>
    <button type="submit" class="login-btn">Masuk</button>
    <p id="loginError" class="login-error"></p>
  </form>
  <p class="login-footer">Keluarga Allah Counseling Center</p>
</div>

<div id="loadingOverlay" class="loading-overlay hidden">
  <div class="spinner"></div>
</div>

<script>
const form = document.getElementById('loginForm');
const error = document.getElementById('loginError');
const overlay = document.getElementById('loadingOverlay');
form.addEventListener('submit', async (e) => {
  e.preventDefault();
  error.textContent = '';
  overlay.classList.remove('hidden');
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  try {
    const res = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();
    if (data.success) {
      window.location.href = '/app.html';
    } else {
      error.textContent = data.error || 'Login gagal';
      overlay.classList.add('hidden');
    }
  } catch (err) {
    error.textContent = 'Terjadi kesalahan jaringan';
    overlay.classList.add('hidden');
  }
});
</script>
</body>
</html>
